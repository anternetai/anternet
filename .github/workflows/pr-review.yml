name: Claude Code PR Review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/master...HEAD > /tmp/pr-diff.txt
          echo "Diff size: $(wc -l < /tmp/pr-diff.txt) lines"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Review
        id: claude_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF_CONTENT=$(head -5000 /tmp/pr-diff.txt)

          claude -p "You are a senior engineer reviewing a pull request for HomeField Hub — a Next.js 16 / React 19 / TypeScript 5.9 / Tailwind 4 / Supabase application.

          Review the following PR diff and check for:
          1. **Bugs** — logic errors, off-by-ones, null/undefined dereferences, async issues
          2. **Security vulnerabilities** — SQL injection, XSS, exposed secrets, missing auth checks, insecure API routes
          3. **TypeScript errors** — missing types, improper casts, any usage that should be typed
          4. **Missing tests** — critical paths or edge cases with no test coverage
          5. **Code quality** — duplicate code, overly complex logic, missing error handling, performance issues
          6. **Next.js / React patterns** — incorrect use of Server Components vs Client Components, missing Suspense boundaries, improper use of useEffect

          For each issue found:
          - State the severity: CRITICAL / WARNING / SUGGESTION
          - Provide the exact file path and line number
          - Explain what the problem is
          - Suggest a concrete fix

          If no significant issues are found, say so clearly.

          PR DIFF:
          ${DIFF_CONTENT}" \
            --output-format json \
            --max-turns 3 \
            2>/dev/null > /tmp/review.json || echo '{"result":"Claude review encountered an error. Check ANTHROPIC_API_KEY secret and retry."}' > /tmp/review.json

          # Validate JSON output
          if ! python3 -c "import json,sys; json.load(open('/tmp/review.json'))" 2>/dev/null; then
            echo '{"result":"Review output was not valid JSON. Raw output saved for inspection."}' > /tmp/review.json
          fi

          cp /tmp/review.json review.json

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reviewText = '';

            try {
              const raw = fs.readFileSync('review.json', 'utf8');
              const review = JSON.parse(raw);

              // claude -p --output-format json returns { result: "..." }
              reviewText = review.result
                || review.message
                || review.content
                || JSON.stringify(review, null, 2);
            } catch (e) {
              reviewText = 'Failed to parse review output. Check the workflow logs for details.';
            }

            const body = [
              '## Claude Code PR Review',
              '',
              `> Reviewed commit: ${context.sha.slice(0, 7)}`,
              '',
              reviewText,
              '',
              '---',
              '_Automated review by [Claude Code](https://claude.ai/code) — check workflow logs for full output._'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
